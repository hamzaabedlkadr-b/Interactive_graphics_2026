<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Factory Assembly Line</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <section class="viewport" aria-label="Interactive 3D robot factory">
        <canvas id="factory-canvas"></canvas>
        <div class="hud">
          <div>
            <p class="eyebrow">Interactive Graphics Project</p>
            <h1>Robot Factory Assembly Line</h1>
          </div>
          <div class="status">
            <span id="mode-label">Automatic cycle</span>
            <span id="room-label">Assembly room</span>
            <span id="speed-label">1.0x</span>
          </div>
        </div>
        <div class="facility-map" aria-label="Factory minimap">
          <div class="minimap-grid">
            <span class="mini-room mini-assembly"></span>
            <span class="mini-room mini-storage"></span>
            <span class="mini-room mini-control"></span>
            <span class="mini-room mini-inspection"></span>
            <span class="mini-room mini-fabrication"></span>
            <span class="mini-room mini-testing"></span>
            <span class="mini-link mini-main-link"></span>
            <span class="mini-link mini-annex-link"></span>
            <span class="minimap-player" id="minimap-player"></span>
          </div>
        </div>
        <div class="walk-help" id="walk-help">
          Walk: WASD / arrows - Turn: Q / E - Open door: F - Exit: Walk Mode
        </div>
        <div class="controls" aria-label="Scene controls">
          <button id="toggle-animation" type="button">Pause</button>
          <button id="toggle-night" type="button">Night</button>
          <button id="toggle-lamp" type="button">Lamp Off</button>
          <button id="toggle-machines" type="button">Machines Off</button>
          <button id="toggle-scanner" type="button">Scanner Off</button>
          <button id="toggle-drone" type="button">Drone Off</button>
          <button id="robot-speed" type="button">Robot 1x</button>
          <button id="camera-view" type="button">Camera A</button>
          <button id="toggle-walk" type="button">Walk Mode</button>
          <button id="walk-camera-mode" type="button">Walk 3rd</button>
          <label>
            Speed
            <input id="speed-control" type="range" min="0.2" max="2.4" step="0.1" value="1" />
          </label>
          <div class="room-nav" aria-label="Room navigation">
            <button class="room-button active" type="button" data-room="assembly">Assembly</button>
            <button class="room-button" type="button" data-room="storage">Storage</button>
            <button class="room-button" type="button" data-room="control">Control</button>
            <button class="room-button" type="button" data-room="inspection">Inspection</button>
            <button class="room-button" type="button" data-room="fabrication">Fab Lab</button>
            <button class="room-button" type="button" data-room="testing">Testing</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
